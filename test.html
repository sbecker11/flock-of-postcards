<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewPort" content="width=device-width, initial-scale=1.0">
    <title>Module Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #testOutput {
            white-space: pre-wrap;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Module Test</h1>
    <div id="testOutput"></div>

    <script type="module">
        import * as zIndex from './modules/layout/zIndex.mjs';
        import * as parallax from './modules/layout/parallax.mjs';
        import * as viewPort from './modules/layout/viewPort.mjs';
        import * as filters from './modules/layout/filters.mjs';
        import * as bizCard from './modules/cards/bizCard.mjs';
        import * as skillCard from './modules/cards/skillCard.mjs';
        import * as cardUtils from './modules/cards/cardUtils.mjs';
        import * as cardConstants from './modules/cards/cardConstants.mjs';
        import * as autoScroll from './modules/animation/autoScroll.mjs';

        const output = document.getElementById('testOutput');
        const results = [];

        // Test module imports
        results.push('Module Import Test:');
        results.push('zIndex module:', Object.keys(zIndex));
        results.push('parallax module:', Object.keys(parallax));
        results.push('viewPort module:', Object.keys(viewPort));
        results.push('filters module:', Object.keys(filters));
        results.push('bizCard module:', Object.keys(bizCard));
        results.push('skillCard module:', Object.keys(skillCard));
        results.push('cardUtils module:', Object.keys(cardUtils));
        results.push('cardConstants module:', Object.keys(cardConstants));
        results.push('autoScroll module:', Object.keys(autoScroll));

        // Test constants
        results.push('\nConstants Test:');
        results.push('BIZCARD_WIDTH:', cardConstants.BIZCARD_WIDTH);
        results.push('BIZCARD_INDENT:', cardConstants.BIZCARD_INDENT);
        results.push('MIN_BIZCARD_HEIGHT:', cardConstants.MIN_BIZCARD_HEIGHT);

        // Test utility functions
        results.push('\nUtility Functions Test:');
        const testDiv = document.createElement('div');
        testDiv.id = 'test-bizCard-0';
        testDiv.setAttribute('data-bizCard-index', '0');
        document.body.appendChild(testDiv);

        results.push('isBizCardDiv:', cardUtils.isBizCardDiv(testDiv));
        results.push('getBizCardDivIndex:', cardUtils.getBizCardDivIndex(testDiv));

        // Display results
        output.textContent = results.join('\n');
    </script>
</body>
</html>
