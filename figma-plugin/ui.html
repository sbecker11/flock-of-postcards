
<!DOCTYPE html>
<html>
<head>
  <title>Flock of Postcards Design System</title>
  <style>
    body { font-family: Inter, sans-serif; padding: 20px; }
    button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #45a049; }
    .section { margin: 20px 0; }
    .token-count { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Design System Importer</h2>
  <div class="section">
    <h3>Import Design Tokens</h3>
    <p>Click below to import your design tokens into Figma:</p>
    <button onclick="importTokens()">Import All Tokens</button>
    <div class="token-count" id="tokenCount">Loading...</div>
  </div>
  
  <script>
    async function importTokens() {
      try {
        // Load tokens from the design-tokens.json file
        const tokens = {
          "colors": {
            "base": {
              "background-dark": "rgba(0, 0, 77, 1.0)",
              "background-light": "rgba(24, 24, 111, 1.0)",
              "background-middle": "rgba(100, 100, 100, 1.0)",
              "grey-dark": "#444444",
              "grey-darkest": "#333333",
              "grey-medium": "#999999"
            },
            "semantic": {
              "primary-green": "#4CAF50",
              "primary-blue": "#2196F3",
              "text-dark": "#333333",
              "text-medium": "#666666",
              "text-light": "#999999"
            }
          },
          "typography": {
            "families": {
              "primary": "Roboto",
              "secondary": "Inter",
              "monospace": "monospace"
            },
            "sizes": {
              "xs": "8px",
              "sm": "10px",
              "base": "12px",
              "md": "14px",
              "lg": "16px",
              "xl": "20px",
              "2xl": "24px",
              "3xl": "48px"
            },
            "weights": {
              "thin": "100",
              "normal": "400",
              "bold": "700",
              "black": "900"
            }
          }
        };
        
        parent.postMessage({
          pluginMessage: {
            type: 'import-tokens',
            tokens: tokens
          }
        }, '*');
        
      } catch (error) {
        console.error('Error importing tokens:', error);
        alert('Error importing tokens. Please check console for details.');
      }
    }
    
    // Display token count
    document.getElementById('tokenCount').textContent = 
      'Ready to import: 11 colors, 11 typography tokens';
  </script>
</body>
</html>
