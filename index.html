<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
        content="width=device-width,
        initial-scale=1.0"/>
  <meta http-equiv= "X-UA-Compatible"
        content="ie=edge"/>
  <title>flock-of-cards</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./modules/timeline/timeline.css">
  <link rel="stylesheet" href="./modules/alerts/alerts.css">
</head>

<body>
  <!-- jobs.mjs is imported by main.mjs -->
  <script type="module" src="./main.mjs" ></script>
  <script type="module" src="./modules/colors/css_colors.mjs" ></script>
  <script type="module" src="./modules/colors/color_palettes.mjs" ></script>
  
  <div id="main-container">

    <div id="canvas-container" class="scrollable-container">


      <div id="canvas">
        <div id="canvas-top-gradient"></div>
        <div id="canvas-btm-gradient"></div>
        <div id="timeline-container" class="timeline-container-left"></div>
        <div style="height: 100vh; background: lightgrey;">temporary content</div>
      </div>
      <div id="aim-point-dot"></div>
      <div id="bulls-eye">+</div>
      <div id="focal-point">⦻</div>
    </div>

    <div id="resize-handle"></div>

    <div id="right-column">
      <div id="right-header-div" style="display: flex; flex-direction: column; align-items: flex-start;">
        <p class="intro" style="padding-left: 5px;">Welcome to your flock-of-postcards!</p>
        <div class="buttons">
          <button id="select-first-bizcard">First</button>
          <button id="select-next-bizcard">Next</button>
          <button id="select-all-bizcard">All</button>
          <button id="clear-all">Clear</button>
        </div>
        <div id="color-palette-container" tabindex="-1">
            <select id="color-palette-selector" tabindex="0"></select>
        </div>
      </div>
      <div id="resume-div-container" class="scrollable-container">
        <!-- all children must have class="resume-div-container-child"-->
      </div>
      
      <div id="right-footer-div" style="display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <p class="footnote" style="margin: 0; padding-left: 5px;">
                create a flock-of-postcards for your own resume at
                <a target="_blank" href="https://github.com/sbecker11/flock-of-postcards/">flock-of-postcards</a><br>
            </p>
        </div>
        <!--
        <div id="debugScrollingElement"></div>
        <div id="debugFocalPointElement">mouse not in canvas<br>bullsEye:[303,452]<br>focalPoint:[303,452]<br>parallax:[0,0]<br>time:1702688539746<br></div>
        <div id="debugTheSelectedCardDivIdElement">theSelectedCardDivIdStr:null<br>theSelectedCardDivResumeDivIdStr:null<br></div> 
        -->
    </div>
  </div>

  <script>
    // Initialization is now handled in main.mjs

    // For skill-card-div elements
    const cardDivs = document.getElementsByClassName("skill-card-div");

    // For biz-skill-card-div elements
    const bizCardDivs = document.getElementsByClassName("biz-skill-card-div");
  </script>

</body>

</html>
