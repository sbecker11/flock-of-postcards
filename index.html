<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewPort"
        content="width=device-width,
        initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible"
        content="ie=edge"/>

  <title>flock-of-cards</title>

  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./modules/timeline/timeline.css">
  <link rel="stylesheet" href="./styles/resume-container.css">
  <!-- <link rel="stylesheet" href="./styles/scene-container.css"> -->
  <link rel="stylesheet" href="./modules/core/core.css">
  <link rel="stylesheet" href="./modules/scene/scene.css">
  <link rel="stylesheet" href="./styles/controls.css"> 
  <link rel="stylesheet" href="./static_content/css/palette-styles.css">

</head>

<body>
  
  <!-- jobs.mjs is imported by main.mjs -->
  <script type="module" src="./main.mjs" ></script>
  <script type="module" src="./modules/color/cssColors.mjs" ></script>
  <script type="module" src="./modules/color/colorPalettes.mjs" ></script>
  <script type="module" src="./modules/color/colorUtils.mjs" ></script>
  <script type="module" src="./modules/utils/utils.mjs" ></script>
  <script type="module" src="./modules/utils/domUtils.mjs" ></script>
  <script type="module" src="./modules/utils/mathUtils.mjs" ></script>

  
  <div id="main-container">

    <div id="scene-container" class="scrollable-container">
      <div id="scene-plane">
        <div id="scene-plane-top-gradient"></div>
        <div id="scene-plane-btm-gradient"></div>
        <div id="timeline-container" class="timeline-container-left"></div>
      </div>
      <div id="aim-point"></div>
      <div id="bulls-eye">+</div>
      <div id="focal-point">⦻</div>
    </div>

    <div id="resume-container">
      <div id="resume-container-left">
        <div id="resize-handle" class="resize-handle">
          <button class="toggle-collapse-button" id="collapse-left">◀</button>
          <button class="toggle-collapse-button" id="collapse-right">▶</button>
          <span id="scene-visible-percentage">50%</span>
        </div>
      </div>
      <div id="resume-container-right">
        <div id="resume-container-header-div">
          <p class="intro">Welcome to your flock-of-postcards!</p>
          <div id="color-palette-container" tabindex="-1">
            <select id="color-palette-selector" tabindex="0"></select>
          </div>
          <div id="biz-card-sorting-container" tabindex="-1">
              <select id="biz-resume-div-sorting-selector" tabindex="0"></select>
          </div>
          <div id="biz-card-controls">
            <button id="select-first-resume-div" class="biz-card-control-button">First</button>
            <button id="select-prev-resume-div" class="biz-card-control-button">Prev</button>
            <button id="select-next-resume-div" class="biz-card-control-button">Next</button>
            <button id="select-last-resume-div" class="biz-card-control-button">Last</button>
          </div>
        </div>
        <div id="resume-content-div" class="scrollable-container">
          <!-- all children must have class="resume-content-div-child"-->
          <!-- <div id="skills" style="color:black;height:50px;width:100%;"></div> -->
        </div>
        
        <div id="resume-container-footer-div">
          <div>
              <p class="footnote">
                  create a flock-of-postcards for your own resume at
                  <a target="_blank" href="https://github.com/sbecker11/flock-of-postcards/">flock-of-postcards</a><br>
              </p>
          </div>
          <!--
          <div id="debugScrollingElement"></div>
          <div id="debugFocalPointElement">mouse not in scene-plane<br>bullsEye:[303,452]<br>focalPoint:[303,452]<br>parallax:[0,0]<br>time:1702688539746<br></div>
          <div id="debugTheSelectedCardDivIdElement">theSelectedCardDivIdStr:null<br>theSelectedCardDivLineItemIdStr:null<br></div> 
          -->
        </div>
      </div>
    </div>
  </div>

  <script>
    // Initialization is now handled in main.mjs

    // For biz-card-div elements
    const bizCardDivs = document.getElementsByClassName("biz-card-div");
  </script>

</body>

</html>
