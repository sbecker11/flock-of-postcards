<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewPort"
        content="width=device-width,
        initial-scale=1.0"/>
  <meta http-equiv= "X-UA-Compatible"
        content="ie=edge"/>
  <title>flock-of-cards</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./modules/timeline.css">
  <link rel="stylesheet" href="./modules/alerts.css">
  <link rel="stylesheet" href="./modules/cards/cards.css">
  <link rel="stylesheet" href="./static_content/css/palette-styles.css">
</head>

<body>
  <!-- jobs.mjs is imported by main.mjs -->
  <script type="module" src="./main.mjs" ></script>
  <script type="module" src="./modules/alerts.mjs" ></script>
  <script type="module" src="./modules/css_colors.mjs" ></script>
  <script type="module" src="./modules/color_palettes.mjs" ></script>
  
  <div id="main-container">

    <div id="scene-container" class="scrollable-container">
      <div id="scene-div">
        <div id="scene-div-top-gradient"></div>
        <div id="scene-div-btm-gradient"></div>
        <div id="timeline-container" class="timeline-container-left"></div>
        <div style="height: 100vh; background: lightgrey;">temporary content</div>
      </div>
      <div id="aim-point-dot"></div>
      <div id="bulls-eye">+</div>
      <div id="focal-point">⦻</div>
    </div>

    <div id="resume-column">
      <div id="resize-handle"></div>
      <div class="resume-column-left">
        <div class="collapse-buttons-container">
          <button class="toggle-collapse-button" id="collapse-left">◀</button>
          <button class="toggle-collapse-button" id="collapse-right">▶</button>
          <span class="percentage-display">50%</span>
        </div>
      </div>
      <div class="resume-column-right">
        <div id="resume-column-header-div" style="display: flex; flex-direction: column; align-items: flex-start;">
          <p class="intro" style="padding-left: 5px;">Welcome to your flock-of-postcards!</p>
          <div id="color-palette-container" tabindex="-1">
            <select id="color-palette-selector" tabindex="0"></select>
          </div>
          <div id="biz-card-sorting-container" tabindex="-1">
              <select id="biz-card-sorting-selector" tabindex="0"></select>
          </div>
          <div class="biz-card-controls">
            <button id="select-first-biz-card">First</button>
            <button id="select-prev-bizCard">Prev</button>
            <button id="select-next-bizCard">Next</button>
            <button id="select-last-biz-card">Last</button>
          </div>
      </div>
        <div id="resume-content-div" class="scrollable-container">
          <!-- all children must have class="resume-content-div-child"-->
          <!-- <div id="skills" style="color:black;height:50px;width:100%;"></div> -->
        </div>
        
        <div id="resume-column-footer-div" style="display: flex; flex-direction: column;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
              <p class="footnote" style="margin: 0; padding-left: 5px;">
                  create a flock-of-postcards for your own resume at
                  <a target="_blank" href="https://github.com/sbecker11/flock-of-postcards/">flock-of-postcards</a><br>
              </p>
          </div>
          <!--
          <div id="debugScrollingElement"></div>
          <div id="debugFocalPointElement">mouse not in scene-div<br>bullsEye:[303,452]<br>focalPoint:[303,452]<br>parallax:[0,0]<br>time:1702688539746<br></div>
          <div id="debugTheSelectedCardDivIdElement">theSelectedCardDivIdStr:null<br>theSelectedCardDivLineItemIdStr:null<br></div> 
          -->
        </div>
      </div>
    </div>
  </div>

  <script>
    // Initialization is now handled in main.mjs

    // For skill-card-div elements
    const cardDivs = document.getElementsByClassName("skill-card-div");

    // For biz-card-div elements
    const bizCardDivs = document.getElementsByClassName("biz-card-div");
  </script>

  <style>
    #scene-container {
      width: 50%; /* Initial width */
      height: 100vh; /* Full viewPort height */
      overflow-y: scroll; 
      overscroll-behavior: contain;
      -ms-overflow-style: none; /* Hide scrollbar for IE and Edge */
      scrollbar-width: none; /* Hide scrollbar for Firefox */
      overflow-x: hidden; /* prevent horizontal scrolling */
      position: relative;
      isolation: isolate;
      background-color: var(--background-dark);
      z-index: 0;
      /* transition: width 0.3s ease; Add matching transition */
      margin: 0;
      padding: 0;
    }

    /* 
    SCB
    GET STYLING OUT OF THE INDEX>HTML FILE!! 
    *

    #scene-container::-webkit-scrollbar {
      display: none; /* Hide scrollbar for Chrome, Safari, and Opera */
    }

    /* Style for the toggle buttons */
    .toggle-collapse-button {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid gray;
      background: rgba(50, 50, 50, 0.9);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      line-height: 1;
      z-index: 1001;
      margin: 2px 0;
      padding: 0;
    }

    .toggle-collapse-button:hover {
      background-color: rgba(80, 80, 80, 1);
      border-color: white;
    }

    .percentage-display {
      color: white;
      font-size: 10px;
      font-family: monospace;
      text-align: center;
      margin-top: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px;
      width: 100%;
    }

    .percentage-display:hover {
      color: #00ff00;
    }
  </style>

</body>

</html>
